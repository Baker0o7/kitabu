name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-eas-apk:
    name: Build APK with EAS
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Checkout repository
      uses: actions/checkout@v4
      
    - name: ⚡ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🔧 Setup EAS CLI
      run: npm install -g eas-cli@latest
      
    - name: 💾 Create EAS project (if needed)
      run: |
        if ! grep -q "projectId" app.json; then
          echo "Project ID not found in app.json"
          echo "Please run 'eas init' locally and push the changes"
          exit 1
        fi
      continue-on-error: true
      
    - name: 🏗️ Build Android APK
      id: build
      run: |
        echo "Starting EAS build for Android..."
        eas build \
          --platform android \
          --profile preview \
          --non-interactive \
          --no-wait
        echo ""
        echo "✅ Build submitted to EAS queue!"
        echo "📋 Build status will be available at:"
        echo "https://expo.dev/accounts/$(eas whoami --token $EXPO_TOKEN)/projects/kitabu/builds"
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        
    - name: 📧 Notify build started
      if: success()
      run: |
        echo "::notice title=APK Build Started::Your APK is being built on EAS. Check your email or Expo dashboard for the download link."
