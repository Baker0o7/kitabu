name: Build & Release APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Provide Inter fonts
        run: |
          mkdir -p app/src/main/res/font
          D=/usr/share/fonts/truetype/dejavu
          cp "$D/DejaVuSans.ttf"      app/src/main/res/font/inter_regular.ttf
          cp "$D/DejaVuSans.ttf"      app/src/main/res/font/inter_medium.ttf
          cp "$D/DejaVuSans-Bold.ttf" app/src/main/res/font/inter_semibold.ttf

      - name: Accept SDK licences
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_TOOL_OPTIONS: ""          # ← clear runner-injected JVM flags
          GRADLE_OPTS: "-Xmx2g"

      - name: Package APK
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/kitabu-${TAG}.apk"
          echo "APK_NAME=kitabu-${TAG}.apk" >> "$GITHUB_ENV"
          du -sh "dist/kitabu-${TAG}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: dist/${{ env.APK_NAME }}
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: "Kitabu ${{ github.ref_name }}"
          body: |
            ## 📓 Kitabu ${{ github.ref_name }}
            A full-featured, dark-themed **second brain** notes app for Android.

            ### ✨ Features
            - 📝 Rich Markdown editor with live preview
            - 🔗 Bi-directional `[[wikilinks]]` + backlinks
            - 🌐 Knowledge graph (force-directed, zoomable)
            - 🏷️ Nested tags (`#work/meetings`)
            - 📅 Daily notes + 5 built-in templates
            - 🕓 Version history with restore
            - 🤖 AI Assistant — Gemini Flash (free, 1,500 req/day)
            - 🎙️ Voice-to-text input
            - 🔒 Biometric note lock
            - 🎨 8 themes: Noir · Midnight · Forest · Crimson · Dusk · Nord · Rose · Slate

            ### 📲 Install
            1. Download **`${{ env.APK_NAME }}`** below
            2. On your phone: **Settings → Install unknown apps → Allow**
            3. Tap the APK to install

            ### 🤖 Free AI Setup
            Get a Gemini key at [aistudio.google.com](https://aistudio.google.com/apikey) → open app → ☰ → Settings
          files: dist/${{ env.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
