name: Kitabu APK Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.1.0)"
        required: true
        default: v1.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG='${{ inputs.tag }}'
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          VERSION="${TAG#v}"
          APK_NAME="kitabu-${VERSION}-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "${APK_NAME}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=Kitabu ${TAG}" >> "$GITHUB_OUTPUT"
          echo "apk=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitabu-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.apk }}
