name: Build And Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.0)"
        required: true
        default: v1.0.0
      name:
        description: "Release title (optional)"
        required: false
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Ensure Android platform files
        run: flutter create . --platforms=android --project-name kitabu --org com.kitabu

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG='${{ inputs.tag }}'
            NAME='${{ inputs.name }}'
            PRERELEASE='${{ inputs.prerelease }}'
          else
            TAG="${GITHUB_REF_NAME}"
            NAME=""
            PRERELEASE="false"
          fi

          if [ -z "$NAME" ]; then
            NAME="Kitabu ${TAG}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitabu-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
