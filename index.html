<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitabu - Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shapes" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand-wrap">
        <p class="eyebrow">Your thinking space</p>
        <h1 class="brand">Kitabu</h1>
      </div>
      <div class="topbar-actions">
        <button id="new-note-btn" class="btn btn-solid" type="button">New note</button>
        <button id="delete-note-btn" class="btn btn-ghost" type="button">Delete</button>
      </div>
    </header>

    <main class="app-shell">
      <section class="panel panel-list">
        <div class="panel-head">
          <h2>Library</h2>
          <p id="note-count" class="muted">0 notes</p>
        </div>

        <div class="search-wrap">
          <input
            id="search-input"
            class="text-input"
            type="search"
            placeholder="Search title, tags, content"
            autocomplete="off"
          />
        </div>

        <div id="note-list" class="note-list" aria-live="polite"></div>
      </section>

      <section class="panel panel-editor">
        <div id="empty-state" class="empty-state" hidden>
          <h3>No note selected</h3>
          <p>Create one to start writing in Kitabu.</p>
        </div>

        <div id="editor" class="editor" hidden>
          <div class="editor-top">
            <input
              id="title-input"
              class="title-input"
              type="text"
              placeholder="Untitled note"
              maxlength="140"
            />

            <div class="editor-actions">
              <button id="pin-btn" class="btn btn-ghost" type="button">Pin</button>
              <button id="preview-toggle" class="btn btn-ghost" type="button">Preview</button>
            </div>
          </div>

          <input
            id="tags-input"
            class="text-input"
            type="text"
            placeholder="Tags (comma separated)"
            autocomplete="off"
          />

          <div class="body-wrap">
            <textarea
              id="body-input"
              class="body-input"
              placeholder="Write your note..."
            ></textarea>
            <article id="preview-pane" class="preview-pane" hidden></article>
          </div>

          <footer class="editor-footer">
            <span id="meta-text" class="muted">Updated just now</span>
            <span id="stats-text" class="muted">0 words</span>
          </footer>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
